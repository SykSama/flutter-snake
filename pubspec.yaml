name: fnake
description: "A snake game in flutter"
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flame: ^1.37.0
  flame_riverpod: ^5.5.4
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0
  json_serializable: ^6.14.0
  riverpod_annotation: ^4.0.2
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  pigeon: ^26.3.4
  riverpod_generator: ^4.0.3
  build_runner: ^2.15.0
  riverpod_lint: ^3.1.3
  freezed: ^3.2.5

flutter:
  uses-material-design: true
